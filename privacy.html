  <p>更新日期：2025年</p>
  <p><strong>躺苹</strong>（以下简称「本 App」）尊重您的隐私。</p>
  <p><strong>数据存储：</strong>本 App 的数据主要保存在您的设备本地，我们不会主动上传您的个人数据到我们的服务器。</p>
  <p><strong>反馈与登录：</strong>若您使用建议反馈或登录功能，相关信息仅用于改进产品与账号服务，我们不会将您的数据出售给第三方。</p>
  <p>如有疑问，请通过 App 内的「建议反馈」或您填写的联系方式与我们联系。</p>
